<svg width="680" height="640" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Decision tree for choosing a web scraping method</title>
<desc>A flowchart starting from checking the page source, branching into an HTML path (prefer API or JSON-LD, otherwise BeautifulSoup, with an optional login/session step) and a JavaScript path (use Selenium, either for a static-after-load page or for infinite scroll and interaction).</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="640" fill="#ffffff"/>

<!-- Fan-out connectors from T1 to T2 -->
<line x1="300" y1="96" x2="185" y2="160" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>
<line x1="380" y1="96" x2="495" y2="160" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>

<!-- Left column vertical connectors -->
<line x1="185" y1="216" x2="185" y2="280" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>
<line x1="185" y1="336" x2="185" y2="400" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>
<line x1="185" y1="456" x2="185" y2="520" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>

<!-- Right column vertical connectors -->
<line x1="495" y1="216" x2="495" y2="280" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>
<line x1="495" y1="336" x2="495" y2="400" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>
<line x1="495" y1="456" x2="495" y2="520" stroke="#5f5e5a" stroke-width="0.75" marker-end="url(#arrow)"/>

<!-- T1: start (gray) -->
<rect x="190" y="40" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Check page source</text>
<text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#444441">View source or DevTools</text>

<!-- T2 left: teal -->
<rect x="50" y="160" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="185" y="178" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Data already in HTML</text>
<text x="185" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">Server-rendered page</text>

<!-- T2 right: coral -->
<rect x="360" y="160" width="270" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="495" y="178" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Needs JS to render</text>
<text x="495" y="196" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Client-rendered page</text>

<!-- T3 left: teal -->
<rect x="50" y="280" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="185" y="298" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Prefer API or JSON-LD</text>
<text x="185" y="316" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">More stable than raw HTML</text>

<!-- T3 right: coral -->
<rect x="360" y="280" width="270" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="495" y="298" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Use Selenium</text>
<text x="495" y="316" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Real browser automation</text>

<!-- T4 left: purple -->
<rect x="50" y="400" width="270" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="185" y="418" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">Login required?</text>
<text x="185" y="436" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Yes: Session + CSRF (Task 5)</text>

<!-- T4 right: coral -->
<rect x="360" y="400" width="270" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="495" y="418" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Loads once, then static</text>
<text x="495" y="436" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Tasks 6 and 7 pattern</text>

<!-- T5 left: teal -->
<rect x="50" y="520" width="270" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="185" y="538" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">No API or JSON-LD</text>
<text x="185" y="556" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">BeautifulSoup (Tasks 1-2)</text>

<!-- T5 right: coral -->
<rect x="360" y="520" width="270" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="495" y="538" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Infinite scroll or clicks</text>
<text x="495" y="556" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Task 8 pattern</text>

<!-- Legend -->
<circle cx="130" cy="610" r="5" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
<text x="142" y="614" font-family="Arial, sans-serif" font-size="12" fill="#444441">HTML / requests path</text>
<circle cx="350" cy="610" r="5" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
<text x="362" y="614" font-family="Arial, sans-serif" font-size="12" fill="#444441">Selenium path</text>
<circle cx="520" cy="610" r="5" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text x="532" y="614" font-family="Arial, sans-serif" font-size="12" fill="#444441">Login needed</text>
</svg>
